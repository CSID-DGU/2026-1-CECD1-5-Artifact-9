# =============================================
# Team Artifact - 학기 1 로컬 개발 환경
# MySQL + Spring Boot 묶음 정의
# =============================================

services:

  # -------------------------------------------
  # MySQL 8.0 데이터베이스
  # -------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: artifact-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpass}
      MYSQL_DATABASE: artifact_db
      TZ: Asia/Seoul
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - artifact-network

  # -------------------------------------------
  # FastAPI AI 추론 서버
  # -------------------------------------------
  fastapi:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    container_name: artifact-fastapi
    restart: unless-stopped
    environment:
      MIN_TOP1_CONFIDENCE: ${MIN_TOP1_CONFIDENCE:-0.45}
    ports:
      - "8000:8000"
    networks:
      - artifact-network

  # -------------------------------------------
  # Spring Boot 백엔드
  # -------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: artifact-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy   # MySQL이 완전히 켜진 후에 Spring 시작
    environment:
      # Spring → MySQL 연결 (컨테이너끼리 통신은 서비스명 'mysql'로)
      DB_URL: jdbc:mysql://mysql:3306/artifact_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-rootpass}

      # AWS S3 (.env에서 읽음)
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:-local-dev-access-key}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY:-local-dev-secret-key}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-local-dev-bucket}
      AWS_REGION: ${AWS_REGION:-us-east-1}

      # 로컬 Docker 개발에서는 실제 AWS 키 없이 이미지 업로드 흐름을 검증
      IMAGE_STORAGE_TYPE: ${IMAGE_STORAGE_TYPE:-local}
      IMAGE_LOCAL_UPLOAD_DIR: /tmp/artifact-images

      FASTAPI_URL: http://fastapi:8000

      GEMINI_API_KEY: ${GEMINI_API_KEY:-}

      TZ: Asia/Seoul
    ports:
      - "8080:8080"
    networks:
      - artifact-network

# -------------------------------------------
# 영구 저장 볼륨 (컨테이너 지워져도 DB 데이터 유지)
# -------------------------------------------
volumes:
  mysql-data:

# -------------------------------------------
# 컨테이너 간 통신용 가상 네트워크
# -------------------------------------------
networks:
  artifact-network:
    driver: bridge
