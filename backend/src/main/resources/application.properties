# =============================================
# 서버
# =============================================
server.port=8080

# =============================================
# .env 파일 자동 로드 (로컬 실행용)
# - working directory(보통 backend/) 기준 .env 를 properties 형식으로 읽음
# - 파일이 없어도(optional:) 에러 안 남 → 도커 환경에서도 그대로 동작
# =============================================
spring.config.import=optional:file:.env[.properties]

# =============================================
# 파일 업로드 크기 제한
# =============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =============================================
# MySQL (환경 변수에서 주입 — 도커/로컬 둘 다 동작)
# =============================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# =============================================
# AWS S3
# =============================================
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}
cloud.aws.region.static=${AWS_REGION:us-east-1}
cloud.aws.s3.bucket=${AWS_S3_BUCKET}

# =============================================
# 로깅
# =============================================
logging.level.com.artifact=DEBUG
